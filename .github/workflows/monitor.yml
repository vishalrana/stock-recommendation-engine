name: Intraday Monitor
on:
  schedule:
    - cron: '*/15 13-20 * * 1-5'  # Every 15 min from 13:00 to 20:59 UTC (9:00 AM to 4:59 PM EST/EDT) during market hours
  workflow_dispatch:            # Allows manual execution from GitHub interface

jobs:
  monitor:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
          cache: 'pip'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r jobs/requirements.txt
      - name: Run Intraday Monitor
        run: python src/monitor/monitor_positions.py
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          TIINGO_API_KEY: ${{ secrets.TIINGO_API_KEY }}
